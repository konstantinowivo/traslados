<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo negro -->
  <rect width="64" height="64" fill="#000000" rx="8"/>

  <!-- Cuerpo del taxi amarillo -->
  <rect x="10" y="28" width="44" height="20" fill="#FFD700" rx="3"/>

  <!-- Techo del taxi -->
  <rect x="20" y="20" width="24" height="8" fill="#FFD700" rx="2"/>

  <!-- Ventanas -->
  <rect x="22" y="22" width="8" height="5" fill="#000000" rx="1"/>
  <rect x="34" y="22" width="8" height="5" fill="#000000" rx="1"/>

  <!-- Parabrisas delantero -->
  <rect x="14" y="30" width="6" height="8" fill="#000000" opacity="0.3" rx="1"/>

  <!-- Parabrisas trasero -->
  <rect x="44" y="30" width="6" height="8" fill="#000000" opacity="0.3" rx="1"/>

  <!-- Ruedas negras -->
  <circle cx="20" cy="48" r="5" fill="#1a1a1a"/>
  <circle cx="44" cy="48" r="5" fill="#1a1a1a"/>

  <!-- Llantas -->
  <circle cx="20" cy="48" r="2.5" fill="#666666"/>
  <circle cx="44" cy="48" r="2.5" fill="#666666"/>

  <!-- Faros -->
  <rect x="52" y="33" width="2" height="3" fill="#FFFFFF" rx="1"/>
  <rect x="10" y="33" width="2" height="3" fill="#FFFFFF" rx="1"/>

  <!-- Línea decorativa lateral -->
  <rect x="15" y="36" width="34" height="1.5" fill="#000000" opacity="0.2"/>

  <!-- Letrero TAXI en el techo -->
  <rect x="26" y="16" width="12" height="4" fill="#000000" rx="1"/>
  <text x="32" y="19" font-family="Arial, sans-serif" font-size="3" font-weight="bold" fill="#FFD700" text-anchor="middle">TAXI</text>
</svg>
